<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Arena de Combate - IKF</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/personajes.css">
</head>

<body>

    <h1>1º BACHILLERATO</h1>
    <h2>Informática y Digitalización</h2>
    <h2>🏆 ARENA DE COMBATE 🏆</h2>
    
    <!-- Pantalla de Carga -->
    <div id="pantalla-carga" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
        <h2 style="color:#ffcc00; font-family:'Fuente', sans-serif;">PREPARANDO EL RING...</h2>
        <div style="width:300px; height:20px; background:#333; border-radius:10px; overflow:hidden; border:2px solid #555;">
            <div id="barra-progreso" style="width:0%; height:100%; background:linear-gradient(90deg, #ff8c00, #ff4500); transition: width 0.2s;"></div>
        </div>
        <p id="texto-carga" style="color:#888; margin-top:10px; font-weight:bold;">0%</p>
    </div>

    <div id="contenedor-luchadores"></div>
    <div id="vista-ficha"></div>

    <div id="pantalla-combate">
        <h2>💥 ¡DUELO EN CURSO! 💥</h2>

        <div id="arena-combate">
            <div id="visor-p1"></div>
            <div id="log-combate"></div>
            <div id="visor-p2"></div>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button class="btn-arcade" onclick="reiniciarCombate()">🔄 Reiniciar mismo combate</button>
            <button class="btn-arcade btn-secondary" onclick="volverAlMenu()">🏠 Menú Principal</button>
        </div>
    </div>

    <!-- ✅ ÚNICO SCRIPT, EXTERNO -->
    <script src="motor-logica.js"></script>

</body>

</html>
